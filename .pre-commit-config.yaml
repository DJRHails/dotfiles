repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.95.5
    hooks:
      - id: trufflehog
  - repo: local
    hooks:
      - id: check-crypt-patterns
        name: check glassine rules match tracked files
        entry: scripts/check-crypt-patterns.sh
        language: script
        pass_filenames: false
      - id: glassine-check
        name: staged glassine-managed files are encrypted
        entry: glassine check
        language: system
        pass_filenames: false
